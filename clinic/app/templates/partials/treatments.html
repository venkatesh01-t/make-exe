<div id="treatmentModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="modal-backdrop absolute inset-0 bg-black opacity-25" onclick="closeModal('treatmentModal')"></div>

  <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg relative z-10">
    <form hx-post="{% url 'clinic:treatments_partial' %}" 
          hx-target="#treatmentGrid" hx-swap="innerHTML"
          hx-headers='{"X-CSRFToken":"{{csrf_token}}"}'>
      
      <!-- Header -->
      <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
        <h3 class="text-lg font-bold text-gray-800">Add / Edit Treatment</h3>
        <button type="button" onclick="closeModal('treatmentModal')" class="p-2 rounded-xl hover:bg-gray-100">✕</button>
      </div>

      <!-- Body -->
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Treatment Name</label>
          <input type="text" name="name" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea name="description" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm"></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
            <input type="number" name="cost" class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Duration</label>
            <input type="text" name="duration" placeholder="60-90 min"
                   class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
          </div>
        </div>

        <!-- Hidden inputs -->
        <input type="hidden" name="action" value="add">
        <input type="hidden" name="treatment_id" value="">
      </div>

      <!-- Footer -->
      <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
        <button type="button" onclick="closeModal('treatmentModal')" 
                class="px-5 py-2.5 rounded-xl text-sm hover:bg-gray-100">Cancel</button>
        <button type="submit" 
                class="bg-gradient-to-r from-teal-500 to-teal-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">Save Treatment</button>
      </div>
    </form>
  </div>
</div>


<script>
function openEditModal(id, name, description, price, duration) {
    const modal = document.getElementById('treatmentModal');
    openModal('treatmentModal');  // reuse your openModal function

    const form = modal.querySelector('form');
    form.querySelector('input[name="name"]').value = name || '';
    form.querySelector('textarea[name="description"]').value = description || '';
    form.querySelector('input[name="cost"]').value = price || '';
    form.querySelector('input[name="duration"]').value = duration || '';

    form.querySelector('input[name="action"]').value = 'edit';
    form.querySelector('input[name="treatment_id"]').value = id || '';

    modal.querySelector('h3').innerText = "Edit Treatment";
    form.querySelector('button[type="submit"]').innerText = "Update Treatment";
}

function openAddModal() {
    const modal = document.getElementById('treatmentModal');
    openModal('treatmentModal');  // reuse openModal

    const form = modal.querySelector('form');
    form.querySelector('input[name="name"]').value = '';
    form.querySelector('textarea[name="description"]').value = '';
    form.querySelector('input[name="cost"]').value = '';
    form.querySelector('input[name="duration"]').value = '';

    form.querySelector('input[name="action"]').value = 'add';
    form.querySelector('input[name="treatment_id"]').value = '';

    modal.querySelector('h3').innerText = "Add Treatment";
    form.querySelector('button[type="submit"]').innerText = "Save Treatment";
}
</script>

<script>
function openDeleteModal(apptId, name) {
    document.getElementById('deleteRowId').value = apptId;
    document.getElementById('deleteItemName').textContent = name;
    openModal('deleteModal');  // use your existing openModal function
}
</script>
