{% for item in inventory_items %}
                    <tr class="hover:bg-slate-50/50 transition-colors group cursor-pointer" onclick="openInventoryEventsModal('{% url 'clinic:inventory_events' id=item.id %}')">
                        <td class="px-6 md:px-8 py-5">
                            <div class="font-bold text-slate-900">{{ item.name }}</div>
                            <div class="text-[10px] font-bold text-slate-400 mt-0.5">ID: #{{ item.id }}</div>
                        </td>
                        <td class="px-6 md:px-8 py-5">
                            <span class="px-2.5 py-1 rounded-lg bg-teal-50 text-teal-600 text-[10px] font-black uppercase">
                                {{ item.category }}
                            </span>
                        </td>
                        <td class="px-6 md:px-8 py-5">
                            <div class="flex items-center justify-center gap-3">
                                <button hx-post="{% url 'clinic:inventoryop' id=item.id key='less' %}" hx-headers='{"X-CSRFToken":"{{csrf_token}}"}' onclick="event.stopPropagation(); changeQuantity(this, -1)" class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-white hover:text-rose-600 hover:border-rose-200 hover:shadow-sm transition-all">-</button>
                                <span class="text-sm font-black text-slate-800 w-8 text-center">{{ item.qty }}</span>
                                <button hx-post="{% url 'clinic:inventoryop' id=item.id key='add' %}" hx-headers='{"X-CSRFToken":"{{csrf_token}}"}' onclick="event.stopPropagation(); changeQuantity(this, 1)" class="w-8 h-8 rounded-lg border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-white hover:text-teal-600 hover:border-teal-200 hover:shadow-sm transition-all">+</button>
                            </div>
                        </td>
                        <td class="px-6 md:px-8 py-5 text-sm text-slate-500 font-medium">
                            {{ item.expiry|date:"Y-m-d"|default:"—" }}
                        </td>
                        <td class="px-6 md:px-8 py-5">
                            <div class="flex items-center justify-end gap-2 opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-opacity" onclick="event.stopPropagation()">
                                <button onclick="openInventoryEventsModal('{% url 'clinic:inventory_events' id=item.id %}')" 
                                        title="View Event History"
                                        class="p-2 rounded-xl bg-white border border-slate-100 text-slate-500 hover:text-blue-600 hover:border-blue-200 transition shadow-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                </button>
                                <button onclick="openEditItemModal('{{ item.id }}', '{{ item.name|escapejs }}', '{{ item.category }}', '{{ item.qty }}', '{{ item.expiry|date:'Y-m-d' }}', '{{ item.notes|escapejs }}')" 
                                        class="p-2 rounded-xl bg-white border border-slate-100 text-slate-500 hover:text-teal-600 hover:border-teal-200 transition shadow-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                                </button>
                                <button onclick="openDeleteModal('{{ item.id }}', '{{ item.name|escapejs }}')" 
                                        class="p-2 rounded-xl bg-white border border-slate-100 text-slate-400 hover:text-rose-600 hover:border-rose-200 transition shadow-sm">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="5" class="px-8 py-10 text-center text-slate-400 font-medium">No items found in inventory.</td>
                    </tr>
                    {% endfor %}
