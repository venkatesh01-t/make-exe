


    <form hx-post="{% url 'clinic:user_edit' user.id %}"
          hx-headers='{"X-CSRFTOKEN":"{{csrf_token}}"}'
          hx-target="#users-table-body"
          hx-swap="innerHTML"
    >

        <!-- Header -->
        <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
            <h3 class="text-lg font-bold text-gray-800">
                Edit User
            </h3>

            <button type="button"
                    class="p-2 rounded-xl hover:bg-gray-100"
                    onclick="closeModal('userModaledit')">
                ✕
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 space-y-4">

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username *</label>
                <input type="text"
                       name="username"
                       value="{{ user.username }}"
                       required
                       class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                <input type="email"
                       name="email"
                       value="{{ user.email }}"
                       required
                       class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
            </div>

            <!-- Password (Optional on Edit) -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    New Password (Leave blank to keep current)
                </label>

                <div class="relative">
                    <input type="password"
                           name="password"
                           id="password"
                           required
                           class="w-full border border-gray-200 rounded-xl px-4 py-2.5 pr-12 text-sm">
                        
                    <button type="button"
                            onclick="togglePassword(this)"
                            class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500">
                        👁
                    </button>
                </div>
            </div>

            <!-- Phone -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone *</label>
                <input type="text"
                       name="phonenumber"
                       value="{{ user.phone_number }}"
                       required
                       class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm">
            </div>

            <!-- Role -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Role *</label>
                <select name="role"
                        required
                        id="roleSelect"
                        onchange="handleRoleChange()"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-white">

                    <option value="admin" {% if user.custom_permissions == "admin" %}selected{% endif %}>Admin</option>
                    <option value="doctor" {% if user.custom_permissions == "doctor" %}selected{% endif %}>Doctor</option>
                    <option value="worker" {% if user.custom_permissions == "worker" %}selected{% endif %}>Worker</option>

                </select>
            </div>

            <!-- Doctor Selection (shown only when role is doctor) -->
            <div id="doctorSelection" style="display: none;">
                <label class="block text-sm font-medium text-gray-700 mb-1">Select Doctor *</label>
                <select name="doctor_id"
                        id="doctorSelect"
                        class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm bg-white">
                    <option value="">-- Select a Doctor --</option>
                    {% for doctor in doctors %}
                    <option
                        value="{{ doctor.id }}"
                        data-name="{{ doctor.name }}"
                        data-specialization="{{ doctor.specialization }}"
                        data-experience="{{ doctor.experience }}"
                        {% if user.doctor_id == doctor.id %}selected{% endif %}>
                        {{ doctor.name }}
                    </option>
                    {% endfor %}
                </select>
                <div id="doctorDetails" style="margin-top: 12px; padding: 12px; background-color: #f9fafb; border-radius: 8px; display: none; border: 1px solid #e5e7eb;">
                    <div class="space-y-2">
                        <p class="text-sm text-gray-700"><strong>Name:</strong> <span id="doctorName" class="text-gray-600"></span></p>
                        <p class="text-sm text-gray-700"><strong>Specialization:</strong> <span id="doctorSpec" class="text-gray-600"></span></p>
                        <p class="text-sm text-gray-700"><strong>Experience:</strong> <span id="doctorExp" class="text-gray-600"></span> years</p>
                    </div>
                </div>
            </div>

            <!-- Status -->
            <div class="flex items-center gap-6">
                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox"
                           name="is_staff"
                           {% if user.is_staff %}checked{% endif %}
                           class="rounded border-gray-300">
                    Is Staff
                </label>

                <label class="flex items-center gap-2 text-sm">
                    <input type="checkbox"
                           name="is_active"
                           {% if user.is_active %}checked{% endif %}
                           class="rounded border-gray-300">
                    Is Active
                </label>
            </div>

        </div>

        <!-- Footer -->
        <div class="px-6 py-4 border-t border-gray-100 flex justify-end gap-3">
            <button type="button"
                    class="px-5 py-2.5 rounded-xl text-sm text-gray-700 hover:bg-gray-100"
                    onclick="closeModal('userModaledit')">
                Cancel
            </button>

            <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold">
                Update User
            </button>
        </div>

    </form>
</div>


<script>
function togglePassword(button) {
    const input = document.getElementById("password");
    if (input.type === "password") {
        input.type = "text";
        button.textContent = "🙈";
    } else {
        input.type = "password";
        button.textContent = "👁";
    }
}

document.addEventListener('DOMContentLoaded', function() {
    handleRoleChange(); // Set initial state based on current role
});

// Handle role selection change
function handleRoleChange() {
    const roleSelect = document.getElementById('roleSelect');
    const doctorSelection = document.getElementById('doctorSelection');
    const doctorSelect = document.getElementById('doctorSelect');
    
    if (roleSelect.value === 'doctor') {
        doctorSelection.style.display = 'block';
        doctorSelect.required = true;
        
        // Show doctor details if a doctor is already selected
        if (doctorSelect.value) {
            showDoctorDetails();
        }
    } else {
        doctorSelection.style.display = 'none';
        doctorSelect.required = false;
        doctorSelect.value = '';
        document.getElementById('doctorDetails').style.display = 'none';
    }
}

// Show doctor details when selected
document.addEventListener('change', function(e) {
    if (e.target.id === 'doctorSelect') {
        if (e.target.value) {
            showDoctorDetails();
        } else {
            document.getElementById('doctorDetails').style.display = 'none';
        }
    }
});

// Display selected doctor's details
function showDoctorDetails() {
    const doctorSelect = document.getElementById('doctorSelect');
    const selectedOption = doctorSelect.options[doctorSelect.selectedIndex];
    if (selectedOption && selectedOption.value) {
        document.getElementById('doctorName').textContent = selectedOption.dataset.name || '';
        document.getElementById('doctorSpec').textContent = selectedOption.dataset.specialization || '';
        document.getElementById('doctorExp').textContent = selectedOption.dataset.experience || '';
        document.getElementById('doctorDetails').style.display = 'block';
    }
}
</script>
