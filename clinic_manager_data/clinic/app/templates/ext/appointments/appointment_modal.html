<div id="appointmentModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
  <div class="modal-backdrop absolute inset-0" onclick="closeModal('appointmentModal')"></div>
  <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg relative z-10 max-h-[90vh] overflow-y-auto">

    <!-- Form starts here and wraps everything -->
    <form hx-post="{% url 'clinic:appointments_create' %}" hx-target="#appointmentTableBody" hx-headers='{"X-CSRFTOKEN":"{{csrf_token}}"}'
          >

      <!-- Header -->
      <div
        class="px-6 py-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl">
        <h3 class="text-lg font-bold text-gray-800">New Appointment</h3>
        <button type="button" class="p-2 rounded-xl hover:bg-gray-100 transition"
          onclick="closeModal('appointmentModal')">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Form Fields -->
      <div class="p-6 space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Patient Name <span
              class="text-red-500">*</span></label>
          <input type="text" name="name" placeholder="Search or enter patient name"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 transition" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Doctor <span class="text-red-500">*</span></label>
          <select name="doctor"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 bg-white" required>
            <option value="">Select Doctor</option>
            {% for doctor in doctors %}
              <option value="{{ doctor.name }}">DR. {{ doctor.name }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Treatment <span
              class="text-red-500">*</span></label>
          <select name="treatment"
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 bg-white" required>
            <option value="">Select Treatment</option>
            {% for i in treatment%}
            <option value="{{i.Treatment_name}}">{{i.Treatment_name}}</option>
            {% endfor %}
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Date <span class="text-red-500">*</span></label>
            <input type="date" name="date"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Time <span class="text-red-500">*</span></label>
            <input type="time" name="time"
              class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
          <textarea name="notes" rows="3" placeholder="Additional notes..."
            class="w-full border border-gray-200 rounded-xl px-4 py-2.5 text-sm text-gray-800 resize-none"></textarea>
        </div>
      </div>

      <!-- Footer with Submit Button - INSIDE the form -->
      <div
        class="px-6 py-4 border-t border-gray-100 flex items-center justify-end gap-3 sticky bottom-0 bg-white rounded-b-2xl">
        <button type="button"
          class="px-5 py-2.5 rounded-xl text-sm font-medium text-gray-700 hover:bg-gray-100 transition"
          onclick="closeModal('appointmentModal')">Cancel</button>
        <button type="submit"
          class="bg-gradient-to-r from-teal-500 to-teal-600 text-white px-5 py-2.5 rounded-xl text-sm font-semibold shadow-lg shadow-teal-200 hover:shadow-xl transition ">Schedule
          Appointment</button>
      </div>

    </form>
    <!-- Form ends here -->

  </div>
</div>
