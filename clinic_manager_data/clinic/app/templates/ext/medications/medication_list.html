{% for medication in medications %}
<tr id="med-row-{{ medication.id }}" class="hover:bg-slate-50 transition border-b border-gray-50">
  <td class="px-4 sm:px-6 py-4 text-sm font-semibold text-gray-700">{{ medication.category }}</td>
  <td class="px-4 sm:px-6 py-4 text-sm text-gray-700">{{ medication.name }}</td>
  <td class="px-4 sm:px-6 py-4 text-sm text-gray-600">{{ medication.dosage }}</td>
  <td class="px-4 sm:px-6 py-4 text-sm text-gray-600">{{ medication.frequency }}</td>
  <td class="px-4 sm:px-6 py-4 text-sm text-gray-600">{{ medication.duration }}</td>
  <td class="px-4 sm:px-6 py-4 text-center">
    <div class="flex items-center justify-center gap-2">
      <button type="button" onclick="openEditMedicationModal({{ medication.id }}, '{{ medication.category }}', '{{ medication.name }}', '{{ medication.dosage }}', '{{ medication.frequency }}', '{{ medication.duration }}')" 
        class="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100 transition" title="Edit">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
        </svg>
      </button>
      <button type="button" onclick="openMedicationDeleteModal({{ medication.id }}, '{{ medication.name }}')" 
        class="w-8 h-8 rounded-lg bg-red-50 text-red-600 flex items-center justify-center hover:bg-red-100 transition" title="Delete">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
        </svg>
      </button>
    </div>
  </td>
</tr>
{% empty %}
<tr>
  <td colspan="6" class="px-4 sm:px-6 py-8 text-center text-gray-400 italic">No medications found. Add one to get started.</td>
</tr>
{% endfor %}
