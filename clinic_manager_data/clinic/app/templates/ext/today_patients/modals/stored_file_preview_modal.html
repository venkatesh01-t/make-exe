<div id="storedFilePreviewModal" class="hidden fixed inset-0 z-[70] flex items-center justify-center p-3 sm:p-4" onclick="if (event.target === this) closeStoredFilePreviewModal()">
  <div class="modal-backdrop absolute inset-0 bg-slate-900/70" onclick="closeStoredFilePreviewModal()"></div>
  <div class="modal-content bg-white rounded-3xl shadow-2xl w-full max-w-6xl relative z-10 max-h-[94vh] overflow-hidden flex flex-col pointer-events-auto">
    <div class="px-5 sm:px-7 py-4 border-b border-slate-100 flex items-center justify-between">
      <div class="min-w-0">
        <h3 class="text-base sm:text-lg font-black text-slate-900">Stored File Preview</h3>
        <p id="storedFilePreviewName" class="text-xs text-slate-500 truncate">-</p>
      </div>
      <div class="flex items-center gap-2">
        <button id="storedFilePreviewPrevBtn" type="button" onclick="previewPreviousStoredImage()" class="hidden px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:opacity-40" title="Previous image">Prev</button>
        <button id="storedFilePreviewNextBtn" type="button" onclick="previewNextStoredImage()" class="hidden px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-100 text-slate-700 hover:bg-slate-200 disabled:opacity-40" title="Next image">Next</button>
        <span id="storedFilePreviewImageCounter" class="hidden text-xs font-bold text-slate-500"></span>
        <a id="storedFilePreviewOpenLink" href="#" target="_blank" rel="noopener" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-blue-50 text-blue-700 hover:bg-blue-100">Open New Tab</a>
        <button type="button" onclick="closeStoredFilePreviewModal()" class="p-2 rounded-xl hover:bg-slate-100 transition">
          <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <div id="storedFilePreviewBody" class="flex-1 overflow-auto bg-slate-100 p-3 sm:p-4"></div>
  </div>
</div>
