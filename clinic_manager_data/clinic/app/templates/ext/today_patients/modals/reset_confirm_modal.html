      <div id="resetConfirmModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4" onclick="if (event.target === this) closeModal('resetConfirmModal')">
        <div class="modal-backdrop absolute inset-0" onclick="closeModal('resetConfirmModal')"></div>
        <div class="modal-content animate-in bg-white rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6 sm:p-8">
          <div class="text-center">
            <div class="w-12 h-12 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-4">
              <i data-lucide="alert-triangle" class="w-6 h-6 text-red-500"></i>
            </div>
            <h3 class="text-lg font-bold text-gray-800 mb-2">Clear Form?</h3>
            <p class="text-sm text-gray-500 mb-6">This will remove all patient data and medicines. You cannot undo this
              action.</p>
            <div class="flex gap-3">
              <button onclick="closeModal('resetConfirmModal')"
                class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold text-gray-500 bg-gray-50 hover:bg-gray-100 transition">Cancel</button>
              <button onclick="executeReset()"
                class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-red-500 hover:bg-red-600 transition shadow-lg shadow-red-100">Clear
                Data</button>
            </div>
          </div>
        </div>
      </div>
