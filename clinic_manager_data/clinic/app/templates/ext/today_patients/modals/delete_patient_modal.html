<div id="deletePatientModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" onclick="if (event.target === this) closeModal('deletePatientModal')">
  <div class="modal-backdrop absolute inset-0" onclick="closeModal('deletePatientModal')"></div>
  <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-sm relative z-10 p-6 text-center pointer-events-auto">
    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
      </svg>
    </div>
    <form id="deletePatientForm" hx-post="{% url 'clinic:today_patient_delete' %}" hx-target="#appointmentTableBody" hx-swap="innerHTML" hx-headers='{"X-CSRFTOKEN":"{{csrf_token}}"}'>
        
    <h3 class="text-xl font-bold text-gray-900">Delete Patient?</h3>
    <p class="text-sm text-gray-500 mt-2 mb-6">Are you sure you want to remove <span id="deletePatientName"
        class="font-bold text-gray-800">this patient</span>? This action cannot be undone.</p>
    <div class="flex gap-3">
      <button type="button" onclick="closeModal('deletePatientModal')"
        class="flex-1 py-2.5 bg-gray-100 text-gray-700 font-bold rounded-xl hover:bg-gray-200 transition">Cancel</button>
        
        <button type="button" onclick="todayPatientsConfirmDeletePatient()"  
        class="flex-1 py-2.5 bg-red-600 text-white font-bold rounded-xl shadow-lg shadow-red-200 hover:bg-red-700 transition">Yes,
        Delete</button>
        <input name="daily_patient_id" value="" id="confirmDeleteButton" type="hidden">
      </form>
      
    </div>
  </div>
</div>
