<div id="patientCameraCaptureModal" class="hidden fixed inset-0 z-[65] flex items-center justify-center p-3 sm:p-4" onclick="if (event.target === this) closePatientCameraCaptureModal()">
  <div class="modal-backdrop absolute inset-0" onclick="closePatientCameraCaptureModal()"></div>
  <div class="modal-content bg-white rounded-3xl shadow-2xl w-full max-w-4xl relative z-10 max-h-[92vh] overflow-hidden flex flex-col pointer-events-auto">
    <div class="px-5 sm:px-7 py-4 border-b border-slate-100 bg-gradient-to-r from-amber-50 via-orange-50 to-rose-50 flex items-center justify-between">
      <div>
        <h3 class="text-lg sm:text-xl font-black text-slate-900">Patient Camera Capture</h3>
        <p id="cameraCaptureSubtitle" class="text-xs text-slate-500 mt-1">Capture photos and upload directly to patient files</p>
      </div>
      <button type="button" onclick="closePatientCameraCaptureModal()" class="p-2 rounded-xl hover:bg-slate-100 transition">
        <svg class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto p-5 sm:p-7 space-y-5">
      <input type="hidden" id="cameraDailyPatientId" value="">
      <input type="hidden" id="cameraPatientId" value="">

      <div class="rounded-2xl border border-orange-100 bg-gradient-to-b from-white to-orange-50/40 p-4 sm:p-5">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between mb-3">
          <div class="flex items-center gap-2">
            <h4 class="text-xs font-black uppercase tracking-wider text-slate-500">Camera Capture</h4>
            <span id="cameraLensBadge" class="px-2 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-600">Rear Camera</span>
            <span id="cameraTorchBadge" class="px-2 py-1 rounded-full text-[10px] font-bold bg-slate-100 text-slate-600">Flash Off</span>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <button type="button" id="startCameraBtn" onclick="startPatientUploadCamera()" title="Start Camera" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-indigo-50 text-indigo-700 hover:bg-indigo-100">Start</button>
            <select id="cameraDeviceSelect" onchange="onCameraDeviceSelectChange(this.value)" title="Select Camera" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-cyan-50 text-cyan-700 hover:bg-cyan-100 border border-cyan-200" disabled>
              <option value="">Camera list</option>
            </select>
            <button type="button" id="flashCameraBtn" onclick="togglePatientUploadFlash()" title="Toggle Flash" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-amber-50 text-amber-700 hover:bg-amber-100" disabled>Flash</button>
            <button type="button" id="stopCameraBtn" onclick="stopPatientUploadCamera()" title="Stop Camera" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-100 text-slate-700 hover:bg-slate-200" disabled>Stop</button>
            <button type="button" id="takePhotoBtn" onclick="capturePhotoFromCamera()" title="Take Photo (Space)" class="px-4 py-2 rounded-xl text-xs font-black uppercase tracking-wider bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm" disabled>Take Photo</button>
            <button type="button" id="cameraShortcutQuickBtn" onclick="openCameraShortcutConfigModal()" title="Current capture key" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-sky-50 text-sky-700 hover:bg-sky-100">Key: Space</button>
            <button type="button" onclick="openCameraShortcutConfigModal()" title="Configure Camera Shortcut" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-teal-50 text-teal-700 hover:bg-teal-100">+ Config</button>
          </div>
        </div>

        <div class="rounded-2xl overflow-hidden border border-slate-200 bg-slate-900 relative">
          <video id="patientCameraPreview" class="w-full h-56 sm:h-80 object-cover" autoplay muted playsinline></video>
          <div id="cameraCaptureFlashFx" class="pointer-events-none absolute inset-0 bg-white opacity-0 transition-opacity duration-150"></div>
          <div class="pointer-events-none absolute inset-3 border border-white/30 rounded-xl"></div>
        </div>
        <canvas id="patientCameraCaptureCanvas" class="hidden"></canvas>
        <p id="cameraCaptureFeedback" class="hidden mt-2 text-xs font-semibold"></p>

        <div class="mt-4">
          <div class="flex items-center justify-between mb-2">
            <h5 class="text-[11px] font-black uppercase tracking-wider text-slate-500">Captured Photos</h5>
            <button type="button" onclick="clearCapturedCameraImages()" class="text-xs font-bold text-red-500 hover:text-red-600">Clear Captured</button>
          </div>
          <div id="capturedCameraGallery" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3"></div>
          <p id="capturedCameraGalleryEmpty" class="text-xs text-slate-400 italic">No photos captured yet.</p>
        </div>
      </div>
    </div>

    <div class="px-5 sm:px-7 py-4 border-t border-slate-100 bg-slate-50 flex flex-col sm:flex-row gap-3 sm:justify-end">
      <button type="button" onclick="closePatientCameraCaptureModal()" class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 font-bold hover:bg-slate-100">Close</button>
      <button id="cameraCaptureUploadBtn" type="button" onclick="submitCapturedCameraUploads()" class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-amber-600 text-white font-bold hover:bg-amber-700 disabled:opacity-40" disabled>Upload Captured</button>
    </div>
  </div>
</div>
