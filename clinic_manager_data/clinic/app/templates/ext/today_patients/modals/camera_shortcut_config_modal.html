<div id="cameraShortcutConfigModal" class="hidden fixed inset-0 z-[75] flex items-center justify-center p-3 sm:p-4" onclick="if (event.target === this) closeCameraShortcutConfigModal()">
  <div class="modal-backdrop absolute inset-0" onclick="closeCameraShortcutConfigModal()"></div>
  <div class="modal-content bg-white rounded-3xl shadow-2xl w-full max-w-xl relative z-10 p-6 sm:p-8 pointer-events-auto">
    <div class="mb-6">
      <h3 class="text-xl sm:text-2xl font-black text-slate-900">Configure Camera Shortcut</h3>
      <p class="text-sm text-slate-500 mt-2">Press any key to set it as your camera capture shortcut</p>
    </div>

    <div class="space-y-6">
      <div class="rounded-2xl border-2 border-dashed border-teal-200 bg-teal-50/50 p-6 text-center">
        <p class="text-xs uppercase tracking-wider font-bold text-teal-600 mb-3">Press Any Key</p>
        <div id="configKeyDisplay" class="text-5xl font-black text-teal-700 font-mono tracking-wider">-</div>
        <p id="configKeyName" class="text-sm text-slate-600 mt-3"></p>
      </div>

      <div class="bg-slate-50 rounded-xl p-4 border border-slate-200">
        <p class="text-xs font-bold text-slate-600 mb-2 uppercase tracking-wider">Current Shortcut</p>
        <div class="flex items-center gap-3">
          <div id="currentShortcutDisplay" class="px-4 py-2 rounded-lg bg-white border border-slate-300 font-bold text-slate-700">Space</div>
          <button type="button" onclick="resetCameraShortcutToDefault()" class="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-100 text-slate-700 hover:bg-slate-200">Reset to Default</button>
        </div>
      </div>

      <div class="bg-amber-50 border border-amber-200 rounded-xl p-4">
        <p class="text-xs font-bold text-amber-700 mb-1">💡 Tip:</p>
        <p class="text-xs text-amber-700">Any key will work - try Keys like Enter, E, P, or any number. The key will be remembered for next time.</p>
      </div>
    </div>

    <div class="mt-8 flex flex-col sm:flex-row gap-3 sm:justify-end">
      <button type="button" onclick="closeCameraShortcutConfigModal()" class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-white border border-slate-200 text-slate-600 font-bold hover:bg-slate-100">Close</button>
      <button type="button" onclick="saveCameraShortcutConfig()" class="w-full sm:w-auto px-5 py-2.5 rounded-xl bg-teal-600 text-white font-bold hover:bg-teal-700">Save & Use</button>
    </div>
  </div>
</div>
