<div id="viewPatientModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" onclick="if (event.target === this) closeModal('viewPatientModal')">
  <div class="modal-backdrop absolute inset-0" onclick="closeModal('viewPatientModal')"></div>
  <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg relative z-10 max-h-[90vh] overflow-y-auto pointer-events-auto">
    <div
      class="px-6 py-4 border-b border-gray-100 flex items-center justify-between sticky top-0 bg-white rounded-t-2xl">
      <h3 class="text-lg font-bold text-gray-800">Patient Details</h3>
      <button class="p-2 rounded-xl hover:bg-gray-100 transition" onclick="closeModal('viewPatientModal')"><svg
          class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg></button>
    </div>
    <div class="p-6 space-y-4">
      <!-- Patient header -->
      <div class="flex items-center gap-4 p-4 bg-gradient-to-r from-teal-50 to-cyan-50 rounded-xl">
        <div
          class="w-14 h-14 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center text-white font-bold text-lg shadow-md"
          id="viewPatientInitials">--</div>
        <div>
          <p id="viewPatientName" class="text-lg font-bold text-gray-800">--</p>
          <p id="viewPatientId" class="text-sm text-gray-500">--</p>
        </div>
        <span id="viewPatientStatusBadge" class="ml-auto badge bg-green-100 text-green-700">Active</span>
      </div>
      <!-- Info grid -->
      <div class="grid grid-cols-2 gap-4">
        <div class="p-4 bg-gray-50 rounded-xl">
          <p class="text-xs text-gray-500 uppercase font-bold mb-1">Phone</p>
          <p id="viewPatientPhone" class="text-sm font-medium text-gray-800">--</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-xl">
          <p class="text-xs text-gray-500 uppercase font-bold mb-1">Email</p>
          <p id="viewPatientEmail" class="text-sm font-medium text-gray-800">--</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-xl">
          <p class="text-xs text-gray-500 uppercase font-bold mb-1">Age</p>
          <p id="viewPatientAge" class="text-sm font-medium text-gray-800">--</p>
        </div>
        <div class="p-4 bg-gray-50 rounded-xl">
          <p class="text-xs text-gray-500 uppercase font-bold mb-1">Gender</p>
          <p id="viewPatientGender" class="text-sm font-medium text-gray-800">--</p>
        </div>
      </div>
      <div class="p-4 bg-gray-50 rounded-xl">
        <p class="text-xs text-gray-500 uppercase font-bold mb-1">Last Visit</p>
        <p id="viewPatientLastVisit" class="text-sm font-medium text-gray-800">--</p>
      </div>
      <div class="p-4 bg-gray-50 rounded-xl">
        <p class="text-xs text-gray-500 uppercase font-bold mb-1">Medical Notes</p>
        <p id="viewPatientNotes" class="text-sm font-medium text-gray-800">--</p>
      </div>
    </div>
    <div
      class="px-6 py-4 border-t border-gray-100 flex items-center justify-end gap-3 sticky bottom-0 bg-white rounded-b-2xl">
      <button class="w-full py-3 bg-gray-800 text-white rounded-xl font-bold hover:bg-gray-900 transition"
        onclick="closeModal('viewPatientModal')">Close</button>
    </div>
  </div>
</div>
