{% for i in treatment %}
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 card-hover relative">
    <div class="w-12 h-12 rounded-xl bg-teal-100 flex items-center justify-center mb-4 text-teal-600 font-bold text-lg">
      {{ i.Treatment_name|first }}
    </div>
    <h4 class="font-bold text-gray-800 mb-1">{{ i.Treatment_name }}</h4>
    <p class="text-xs text-gray-400 mb-3">{{ i.Description }}</p>
    <div class="flex items-center justify-between">
      <span class="text-xl font-bold text-teal-600">₹{{ i.Price }}</span>
      <span class="text-xs bg-teal-50 text-teal-700 px-2 py-1 rounded-lg font-medium">{{ i.Duration }}</span>
    </div>

    <!-- Edit/Delete Buttons -->
    <div class="absolute top-3 right-3 flex gap-2 z-10 bg-white/50 backdrop-blur-sm rounded-lg">
        <!-- Edit Button -->
        <button type="button" class="tp-btn tp-edit shadow-sm border border-gray-100"
                onclick="openEditModal({{ i.id }}, '{{ i.Treatment_name|escapejs }}', '{{ i.Description|escapejs }}', {{ i.Price }}, '{{ i.Duration|escapejs }}')" title="Edit">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
            <span class="tp-lbl">Edit</span>
        </button>

        <!-- Delete Button -->
        <button type="button" class="tp-btn tp-del shadow-sm border border-gray-100"
                onclick="openDeleteModal({{ i.id }}, '{{ i.Treatment_name|escapejs }}')" title="Delete">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
            <span class="tp-lbl">Delete</span>
        </button>
    </div>
  </div>
{% endfor %}
