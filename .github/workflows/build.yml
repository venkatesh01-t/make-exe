name: Build Windows EXE (Nuitka)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install nuitka ordered-set zstandard
          pip install nuitka customtkinter requests qrcode[pil] waitress

      - name: Build EXE with Nuitka
        shell: pwsh
        run: |
          python -m nuitka main.py `
            --onefile `
            --standalone `
            --enable-plugin=tk-inter `
            --include-package=clinic `
            --include-package-data=customtkinter `
            --include-data-dir=clinic=clinic `
            --windows-uac-admin `
            --windows-disable-console `
            --assume-yes-for-downloads `
            --output-filename=ClinicManager.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClinicManager-Windows
          path: ClinicManager.exe
