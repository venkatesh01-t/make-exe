name: Build Clinic Manager (Windows Portables)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-pyinstaller:
    name: Build using PyInstaller
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build dependencies
        run: |
          pip install pyinstaller
          pip install customtkinter qrcode requests waitress Pillow
          pip install cryptography==49.0.0

      - name: Build EXE (PyInstaller)
        run: >
          pyinstaller clinic_manager.py
          --onefile
          --noconsole
          --name clinic_manager_pyinstaller
          --icon logo.ico
          --add-data "logo.ico;."
          --add-data "clinic_manager_data\clinic;clinic"
          --add-data "clinic_manager_data\clinic\staticfiles;staticfiles"
          --collect-all customtkinter
          --collect-submodules models
          --hidden-import PIL._tkinter_finder
          --clean
          --noconfirm

      - name: Upload PyInstaller artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-manager-windows-pyinstaller
          path: dist/clinic_manager_pyinstaller.exe

  build-nuitka:
    name: Build using Nuitka (Native C Compilation)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build dependencies
        run: |
          pip install nuitka
          pip install customtkinter qrcode requests waitress Pillow
          pip install cryptography==49.0.0

      - name: Build EXE (Nuitka)
        run: >
          nuitka --standalone --onefile
          --enable-plugin=tk-inter
          --windows-console-mode=disable
          --windows-icon-from-ico=logo.ico
          --include-data-dir=clinic_manager_data/clinic=clinic
          --include-data-dir=clinic_manager_data/clinic/staticfiles=staticfiles
          --include-data-file=logo.ico=logo.ico
          --output-dir=dist-nuitka
          clinic_manager.py

      - name: Rename Nuitka EXE
        run: |
          mv dist-nuitka/clinic_manager.exe dist-nuitka/clinic_manager_nuitka.exe
        shell: bash

      - name: Upload Nuitka artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-manager-windows-nuitka
          path: dist-nuitka/clinic_manager_nuitka.exe
