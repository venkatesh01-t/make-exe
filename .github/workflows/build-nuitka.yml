name: Build Clinic Manager (PyInstaller Windows Portable)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python (64-bit)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x64"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install build dependencies
        run: |
          pip install pyinstaller
          pip install customtkinter qrcode requests waitress

      - name: Build EXE (PyInstaller)
        run: >
          pyinstaller clinic_manager.py
          --onefile
          --noconsole
          --name clinic_manager
          --icon logo.ico
          --add-data "logo.ico;."
          --add-data "clinic_manager_data\clinic;clinic"
          --add-data "clinic_manager_data\clinic\staticfiles;staticfiles"
          --clean
          --noconfirm

      - name: Verify output exists
        run: dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinic-manager-windows-x64
          path: dist/clinic_manager.exe