name: Build Windows EXE (Nuitka)

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install nuitka ordered-set zstandard customtkinter darkdetect requests

      - name: Build EXE with Nuitka
        run: |
          python -m nuitka main.py --onefile --standalone --enable-plugin=tk-inter --include-package=requests --include-package=customtkinter --include-package=darkdetect --assume-yes-for-downloads
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            *.exe
            **/*.exe